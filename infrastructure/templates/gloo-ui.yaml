apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-mgmt
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: solo-enterprise
  source:
    repoURL: us-docker.pkg.dev/solo-public/solo-enterprise-helm/charts
    chart: management
    targetRevision: {{ index .Values "gloo-ui" "version" }}
    helm:
      values: |
        cluster: mgmt-cluster
        licensing:
          createSecret: false
          licenseSecretRef:
            name: license-secret
            namespace: solo-enterprise
        products:
          kagent:
            enabled: true
            namespace: kagent
          agentgateway:
            enabled: true
            namespace: agentgateway-system
          mesh:
            enabled: false
          agentregistry:
            enabled: true
        clickhouse:
          enabled: true
        tracing:
          verbose: true
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]